<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>HY AR - Gerçek Dünya Çoklu Yerleştirme</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        
        /* Buton Paneli */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 999;
        }

        .btn {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #007bff;
            padding: 12px 20px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn.active {
            background: #007bff;
            color: white;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 999;
            text-align: center;
            font-size: 14px;
            width: 80%;
        }
    </style>
</head>

<body>

    <div id="info">Zemini tarayın. Halka göründüğünde dokunarak modeli yerleştirin.</div>

    <div id="controls">
        <button id="btn1" class="btn active" onclick="selectModel(1)">Model 1</button>
        <button id="btn2" class="btn" onclick="selectModel(2)">Model 2</button>
        <button id="btn3" class="btn" onclick="selectModel(3)">Model 3</button>
    </div>

    <a-scene 
        webxr="requiredFeatures: hit-test, local-floor; optionalFeatures: dom-overlay; overlayElement: #controls;"
        renderer="colorManagement: true; alpha: true; antialias: true;"
        embedded>

        <a-assets>
            <a-asset-item id="myModel" src="https://cdn.jsdelivr.net/gh/dekoratordt-byte/cokluar@main/model.glb"></a-asset-item>
        </a-assets>

        <a-entity id="reticle" visible="false" raycaster="objects: .none">
            <a-ring color="#007bff" radius-inner="0.08" radius-outer="0.1" rotation="-90 0 0"></a-ring>
        </a-entity>

        <a-entity id="model1" gltf-model="#myModel" scale="0.3 0.3 0.3" visible="false"></a-entity>
        <a-entity id="model2" gltf-model="#myModel" scale="0.3 0.3 0.3" visible="false"></a-entity>
        <a-entity id="model3" gltf-model="#myModel" scale="0.3 0.3 0.3" visible="false"></a-entity>

        <a-entity light="type: ambient; intensity: 1;"></a-entity>
        <a-entity light="type: directional; intensity: 0.8;" position="1 4 3"></a-entity>
    </a-scene>

    <script>
        let selectedModelId = 1;
        const scene = document.querySelector('a-scene');
        const reticle = document.querySelector('#reticle');
        const info = document.querySelector('#info');

        function selectModel(id) {
            selectedModelId = id;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + id).classList.add('active');
            info.innerText = "Model " + id + " seçildi. Zemine dokunarak yerini değiştirin.";
        }

        // WebXR Hit-Test Mantığı
        scene.addEventListener('enter-vr', () => {
            if (scene.is('ar-mode')) {
                info.innerText = "AR Başladı. Zemini yavaşça tarayın...";
                
                const session = scene.xrSession;
                session.addEventListener('select', onSelect);
                
                let hitTestSource = null;
                session.requestReferenceSpace('viewer').then((space) => {
                    session.requestHitTestSource({ space: space }).then((source) => {
                        hitTestSource = source;
                    });
                });

                scene.addEventListener('render-target-loaded', () => {
                    scene.renderer.setAnimationLoop((time, frame) => {
                        if (frame && hitTestSource) {
                            const hitTestResults = frame.getHitTestResults(hitTestSource);
                            if (hitTestResults.length > 0) {
                                const hit = hitTestResults[0];
                                const pose = hit.getPose(scene.xrSession.requestReferenceSpace('local-floor'));
                                
                                reticle.setAttribute('visible', true);
                                reticle.setAttribute('position', pose.transform.position);
                            } else {
                                reticle.setAttribute('visible', false);
                            }
                        }
                    });
                });
            }
        });

        // Ekrana dokunulduğunda (AR Select)
        function onSelect() {
            if (reticle.getAttribute('visible')) {
                const targetModel = document.querySelector('#model' + selectedModelId);
                const newPos = reticle.getAttribute('position');
                
                targetModel.setAttribute('position', newPos);
                targetModel.setAttribute('visible', true);
                
                info.innerText = "Model " + selectedModelId + " yerleştirildi!";
            }
        }
    </script>
</body>
</html>
