<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>HY AR - Önizlemeli Çoklu Model</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f0f0f0; }

        /* Arayüz Konteynırı - Sayfanın altına sabitlendi */
        #ui-overlay {
            position: fixed; /* absolute yerine fixed kullanıldı */
            bottom: 30px; /* Alt kısımdan boşluk */
            padding-bottom: env(safe-area-inset-bottom);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 12px;
            width: max-content;
            z-index: 9999; /* En üstte durması garantilendi */
            pointer-events: none;
        }

        /* Ufak, Beyaz ve Siyah Çerçeveli Butonlar */
        .btn {
            background: #ffffff; /* Beyaz arka plan */
            color: #000000; /* Siyah yazı */
            border: 2px solid #000000; /* Siyah çerçeve */
            padding: 8px 16px; /* Daha ufak boyutlar */
            border-radius: 6px; /* Hafif yuvarlak köşeler */
            font-size: 14px; /* Ufak yazı boyutu */
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            flex: 0 0 auto;
            transition: all 0.2s ease;
            user-select: none; 
            -webkit-user-select: none;
        }

        /* Seçili olan buton siyah arka plan, beyaz yazı olsun */
        .btn.active {
            background: #000000;
            color: #ffffff;
            transform: scale(1.05); /* Tıklanınca çok hafif büyüsün */
        }

        /* Bilgi Paneli */
        #info-box {
            position: fixed;
            top: 40px;
            padding-top: env(safe-area-inset-top);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-family: sans-serif;
            text-align: center;
            z-index: 9999;
            white-space: nowrap;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="ui-overlay">
        <button id="btn1" class="btn active" onclick="selectModel(1)">Model 1</button>
        <button id="btn2" class="btn" onclick="selectModel(2)">Model 2</button>
        <button id="btn3" class="btn" onclick="selectModel(3)">Model 3</button>
    </div>
    <div id="info-box">Sayfa Yüklendi. Önizlemedesiniz. AR için sağ alt butona basın.</div>

    <a-scene 
        webxr="requiredFeatures: hit-test, local-floor; optionalFeatures: dom-overlay; overlayElement: #ui-overlay;"
        renderer="colorManagement: true; alpha: true; antialias: true; physicallyCorrectLights: true;"
        ar-hit-test-custom>

        <a-assets>
            <a-asset-item id="glbModel" src="https://cdn.jsdelivr.net/gh/dekoratordt-byte/cokluar@main/model1.glb"></a-asset-item>
        </a-assets>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>

        <a-entity light="type: ambient; intensity: 0.9;"></a-entity>
        <a-entity light="type: directional; intensity: 0.6; castShadow: false;" position="1 4 2"></a-entity>

        <a-entity id="model1" gltf-model="#glbModel" visible="false" scale="0.3 0.3 0.3"></a-entity>
        <a-entity id="model2" gltf-model="#glbModel" visible="false" scale="0.3 0.3 0.3"></a-entity>
        <a-entity id="model3" gltf-model="#glbModel" visible="false" scale="0.3 0.3 0.3"></a-entity>

        <a-entity id="reticle" visible="false">
            <a-ring color="#000000" radius-inner="0.08" radius-outer="0.12" rotation="-90 0 0"></a-ring>
        </a-entity>

    </a-scene>

    <script>
        let selectedModelId = 1;
        const infoBox = document.getElementById('info-box');

        // Model Seçim Fonksiyonu
        window.selectModel = function(id) {
            selectedModelId = id;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + id).classList.add('active');
            infoBox.innerText = "Model " + id + " Seçildi. Zemini tarayıp dokunun.";
        };

        // Geliştirilmiş Zemin Tarama (Hit-Test) Bileşeni
        AFRAME.registerComponent('ar-hit-test-custom', {
            init: function () {
                this.xrHitTestSource = null;
                this.viewerSpace = null;
                this.refSpace = null;
                this.reticle = document.getElementById('reticle');

                // AR Oturumu Başladığında
                this.el.addEventListener('enter-vr', () => {
                    if (this.el.is('ar-mode')) {
                        infoBox.innerText = "Kamera açıldı! Zemini tarayın...";
                        document.body.style.backgroundColor = "transparent";
                        
                        let session = this.el.sceneEl.renderer.xr.getSession();
                        
                        // Zemin algılama motorunu başlat
                        session.requestReferenceSpace('viewer').then((space) => {
                            this.viewerSpace = space;
                            session.requestHitTestSource({ space: this.viewerSpace }).then((source) => {
                                this.xrHitTestSource = source;
                            });
                        });

                        session.requestReferenceSpace('local-floor').then((space) => {
                            this.refSpace = space;
                        });

                        // Ekrana tıklandığında seçili modeli yerleştir
                        session.addEventListener('select', (event) => {
                            if (this.reticle.getAttribute('visible')) {
                                const activeModel = document.getElementById('model' + selectedModelId);
                                const newPosition = this.reticle.getAttribute('position');
                                
                                // Modeli reticle'ın olduğu yere ışınla ve görünür yap
                                activeModel.setAttribute('position', newPosition);
                                activeModel.setAttribute('visible', 'true');
                                
                                infoBox.innerText = "Model " + selectedModelId + " başarıyla yerleştirildi.";
                            }
                        });
                    }
                });
            },
            tick: function () {
                // Her karede zemini taramaya devam et
                if (!this.el.is('ar-mode') || !this.xrHitTestSource || !this.refSpace) return;
                
                let frame = this.el.sceneEl.frame; 
                if (!frame) return;

                let hitTestResults = frame.getHitTestResults(this.xrHitTestSource);
                
                // Zemin bulunursa halkayı (reticle) göster
                if (hitTestResults.length > 0) {
                    let pose = hitTestResults[0].getPose(this.refSpace);
                    this.reticle.setAttribute('position', pose.transform.position);
                    this.reticle.setAttribute('visible', 'true');
                } else {
                    this.reticle.setAttribute('visible', 'false');
                }
            }
        });
    </script>
</body>
</html>
