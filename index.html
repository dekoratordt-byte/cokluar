<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>HY AR - Çoklu Model Yönetimi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui-overlay {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 10px; pointer-events: none;
        }
        .btn {
            background: #007bff; color: white; border: none; padding: 12px 20px;
            border-radius: 25px; font-weight: bold; pointer-events: auto; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #status {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 10px 20px;
            border-radius: 20px; font-size: 14px; z-index: 100; pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="status">Kamerayı zemine tutun ve modelleri yerleştirin</div>
    
    <div id="ui-overlay">
        <button class="btn" onclick="selectModel(1)">Model 1</button>
        <button class="btn" onclick="selectModel(2)">Model 2</button>
        <button class="btn" onclick="selectModel(3)">Model 3</button>
    </div>

    <a-scene 
        webxr="requiredFeatures: hit-test, local-floor; optionalFeatures: dom-overlay; overlayElement: #ui-overlay;"
        embedded
        gesture-detector
        renderer="colorManagement: true;">

        <a-assets>
            <a-asset-item id="model1" src="https://cdn.jsdelivr.net/gh/dekoratordt-byte/cokluar@main/model.glb"></a-asset-item>
            <a-asset-item id="model2" src="https://cdn.jsdelivr.net/gh/dekoratordt-byte/cokluar@main/model2.glb"></a-asset-item>
            <a-asset-item id="model3" src="https://cdn.jsdelivr.net/gh/dekoratordt-byte/cokluar@main/model1.glb"></a-asset-item>
        </a-assets>

        <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
        <a-entity light="type: directional; intensity: 0.6;" position="1 2 1"></a-entity>

        <a-entity camera position="0 1.6 0"></a-entity>
        
        <a-entity id="wrapper1" position="0 0 -2" visible="true">
            <a-entity id="target1" gltf-model="#model1" scale="0.5 0.5 0.5" 
                      class="clickable" gesture-handler></a-entity>
        </a-entity>

        <a-entity id="wrapper2" position="1 0 -2" visible="true">
            <a-entity id="target2" gltf-model="#model2" scale="0.5 0.5 0.5" 
                      class="clickable" gesture-handler></a-entity>
        </a-entity>

        <a-entity id="wrapper3" position="-1 0 -2" visible="true">
            <a-entity id="target3" gltf-model="#model3" scale="0.5 0.5 0.5" 
                      class="clickable" gesture-handler></a-entity>
        </a-entity>

    </a-scene>

    <script>
        let selectedId = 1;

        // Model Seçme Fonksiyonu
        function selectModel(id) {
            selectedId = id;
            document.getElementById('status').innerText = "Model " + id + " seçildi. Hareket ettirebilirsiniz.";
            
            // Seçili olmayanı görsel olarak belirtmek istersen burada opacity vs. değiştirebilirsin
        }

        // Basit Sürükle-Bırak ve Scale Mantığı (A-Frame Custom Script)
        AFRAME.registerComponent('gesture-handler', {
            schema: { enabled: {default: true} },
            init: function () {
                this.handleScale = this.handleScale.bind(this);
                this.handleRotation = this.handleRotation.bind(this);
                this.isVisible = false;
                
                // Dokunma ile seçme ve hareket ettirme işlemleri buraya entegre edilir
                window.addEventListener('touchstart', (e) => {
                    // Seçili modele göre işlem yap
                });
            },
            handleScale: function (event) {
                if (this.data.enabled) {
                    let s = this.el.getAttribute('scale');
                    this.el.setAttribute('scale', {
                        x: s.x + event.detail.spreadChange,
                        y: s.y + event.detail.spreadChange,
                        z: s.z + event.detail.spreadChange
                    });
                }
            }
        });
    </script>
</body>
</html>
